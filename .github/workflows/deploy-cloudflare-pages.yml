name: Deploy Next.js to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [ main, development, 'agent-*', 'codex/agent-*' ]
    paths:
      - 'web/**'

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    permissions:
      actions: read
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Select target Pages project per branch
        id: select_project
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            TARGET="v0-spaceport-website-prod-fresh"
          else
            TARGET="v0-spaceport-website-preview2"
          fi
          echo "CF_PAGES_PROJECT=$TARGET" >> $GITHUB_ENV
          echo "project=$TARGET" >> $GITHUB_OUTPUT
          echo "Using CF Pages project: $TARGET for branch $BRANCH"

      - name: Configure AWS credentials (production via OIDC)
        if: github.ref_name == 'main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Configure AWS credentials (staging via access keys)
        if: github.ref_name != 'main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Resolve deployment context
        id: resolve_context
        run: |
          set -euo pipefail
          python3 ../scripts/resolve_preview_context.py --branch "${GITHUB_REF_NAME}" --format shell > /tmp/pages-context.env
          cat /tmp/pages-context.env
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_ENV"
          done < /tmp/pages-context.env

      - name: Wait for matching CDK Deploy run
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          max_attempts=120
          sleep_seconds=10
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            response=$(curl -fsSL \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/cdk-deploy.yml/runs?head_sha=${GITHUB_SHA}&branch=${GITHUB_REF_NAME}&event=push&per_page=10")

            run_count=$(echo "$response" | jq '.workflow_runs | length')
            if [ "$run_count" -eq 0 ]; then
              echo "[$attempt/$max_attempts] Waiting for CDK Deploy run to appear for ${GITHUB_SHA}..."
            else
              status=$(echo "$response" | jq -r '.workflow_runs[0].status')
              conclusion=$(echo "$response" | jq -r '.workflow_runs[0].conclusion // empty')
              run_url=$(echo "$response" | jq -r '.workflow_runs[0].html_url')

              echo "[$attempt/$max_attempts] CDK Deploy status=${status} conclusion=${conclusion:-<pending>} url=${run_url}"

              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "Matching CDK Deploy run completed successfully."
                  exit 0
                fi

                echo "Matching CDK Deploy run did not succeed." >&2
                exit 1
              fi
            fi

            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

          echo "Timed out waiting for matching CDK Deploy run for ${GITHUB_SHA}" >&2
          exit 1
      - name: Resolve CloudFormation outputs
        id: stack_outputs
        run: |
          set -euo pipefail

          wait_for_stack() {
            local stack_name="$1"
            local max_attempts=120
            local sleep_seconds=15
            local attempt=1

            while [ "$attempt" -le "$max_attempts" ]; do
              if ! status=$(aws cloudformation describe-stacks \
                --stack-name "$stack_name" \
                --query 'Stacks[0].StackStatus' \
                --output text 2>/dev/null); then
                echo "[$attempt/$max_attempts] Waiting for stack $stack_name to exist..."
              elif [[ "$status" == *_IN_PROGRESS ]]; then
                echo "[$attempt/$max_attempts] Waiting for stack $stack_name to finish: $status"
              elif [[ "$status" == "CREATE_COMPLETE" || "$status" == "UPDATE_COMPLETE" || "$status" == "IMPORT_COMPLETE" || "$status" == "UPDATE_COMPLETE_CLEANUP_IN_PROGRESS" ]]; then
                echo "Stack $stack_name is ready with status $status"
                return 0
              else
                echo "Stack $stack_name reached unexpected status: $status" >&2
                return 1
              fi

              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done

            echo "Timed out waiting for stack $stack_name" >&2
            return 1
          }

          get_output() {
            local stack_name="$1"
            local output_key="$2"
            local max_attempts=120
            local sleep_seconds=5
            local attempt=1
            local value=""

            while [ "$attempt" -le "$max_attempts" ]; do
              value=$(aws cloudformation describe-stacks \
                --stack-name "$stack_name" \
                --query "Stacks[0].Outputs[?OutputKey=='${output_key}'].OutputValue" \
                --output text 2>/dev/null || true)
              if [ -n "$value" ] && [ "$value" != "None" ]; then
                printf '%s' "$value"
                return 0
              fi

              echo "[$attempt/$max_attempts] Waiting for output ${output_key} on stack ${stack_name}..." >&2
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done

            echo "Missing required CloudFormation output ${output_key} on stack ${stack_name}" >&2
            return 1
          }

          wait_for_stack "$SPACEPORT_STACK_NAME"
          wait_for_stack "$ML_STACK_NAME"
          wait_for_stack "$AUTH_STACK_NAME"

          PROJECTS_API_URL="$(get_output "$AUTH_STACK_NAME" "ProjectsApiUrl")"
          COGNITO_USER_POOL_ID="$(get_output "$AUTH_STACK_NAME" "CognitoUserPoolId")"
          COGNITO_USER_POOL_CLIENT_ID="$(get_output "$AUTH_STACK_NAME" "CognitoUserPoolClientId")"
          SUBSCRIPTION_API_URL="$(get_output "$AUTH_STACK_NAME" "SubscriptionApiUrl")"
          BETA_ACCESS_API_URL="$(get_output "$AUTH_STACK_NAME" "BetaAccessAdminApiUrl")"
          MODEL_DELIVERY_ADMIN_API_URL="$(get_output "$AUTH_STACK_NAME" "ModelDeliveryAdminApiUrl")"
          EXPLORE_API_URL="$(get_output "$AUTH_STACK_NAME" "ExplorePublicApiUrl")"

          DRONE_PATH_API_URL="$(get_output "$SPACEPORT_STACK_NAME" "DronePathApiUrl")"
          FILE_UPLOAD_API_URL="$(get_output "$SPACEPORT_STACK_NAME" "FileUploadApiUrl")"
          WAITLIST_API_URL="$(get_output "$SPACEPORT_STACK_NAME" "WaitlistApiUrl")"
          FEEDBACK_API_URL="$(get_output "$SPACEPORT_STACK_NAME" "FeedbackApiUrl")"
          ML_PIPELINE_API_URL="$(get_output "$ML_STACK_NAME" "MLPipelineApiUrl")"

          {
            echo "PROJECTS_API_URL=$PROJECTS_API_URL"
            echo "COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID"
            echo "COGNITO_USER_POOL_CLIENT_ID=$COGNITO_USER_POOL_CLIENT_ID"
            echo "SUBSCRIPTION_API_URL=$SUBSCRIPTION_API_URL"
            echo "BETA_ACCESS_API_URL=$BETA_ACCESS_API_URL"
            echo "MODEL_DELIVERY_ADMIN_API_URL=$MODEL_DELIVERY_ADMIN_API_URL"
            echo "EXPLORE_API_URL=$EXPLORE_API_URL"
            echo "DRONE_PATH_API_URL=$DRONE_PATH_API_URL"
            echo "FILE_UPLOAD_API_URL=$FILE_UPLOAD_API_URL"
            echo "WAITLIST_API_URL=$WAITLIST_API_URL"
            echo "FEEDBACK_API_URL=$FEEDBACK_API_URL"
            echo "ML_PIPELINE_API_URL=$ML_PIPELINE_API_URL"
          } >> "$GITHUB_ENV"

          echo "Resolved deployment class: $DEPLOYMENT_CLASS"
          echo "Spaceport stack: $SPACEPORT_STACK_NAME"
          echo "ML stack: $ML_STACK_NAME"
          echo "Shared auth stack: $AUTH_STACK_NAME"
          echo "Drone Path API: $DRONE_PATH_API_URL"
          echo "File Upload API: $FILE_UPLOAD_API_URL"
          echo "Waitlist API: $WAITLIST_API_URL"
          echo "Feedback API: $FEEDBACK_API_URL"
          echo "ML Pipeline API: $ML_PIPELINE_API_URL"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install deps (tolerant to peer conflicts in CI)
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Inject build-time env (.env) for NEXT_PUBLIC_* per branch
        env:
          MAPS_KEY_PRIMARY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          MAPS_KEY_LEGACY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MAP_ID_PRIMARY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID }}
          MAP_ID_LEGACY: ${{ secrets.GOOGLE_MAPS_MAP_ID }}
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"
          echo "Preparing .env for branch $BRANCH"
          : > .env
          GOOGLE_MAPS_KEY="${MAPS_KEY_PRIMARY:-}"
          if [ -z "$GOOGLE_MAPS_KEY" ]; then GOOGLE_MAPS_KEY="${MAPS_KEY_LEGACY:-}"; fi
          GOOGLE_MAPS_MAP_ID="${MAP_ID_PRIMARY:-}"
          if [ -z "$GOOGLE_MAPS_MAP_ID" ]; then GOOGLE_MAPS_MAP_ID="${MAP_ID_LEGACY:-}"; fi

          if [ "$BRANCH" = "main" ]; then
            echo "NEXT_PUBLIC_PROJECTS_API_URL=$PROJECTS_API_URL" >> .env
            echo "NEXT_PUBLIC_DRONE_PATH_API_URL=$DRONE_PATH_API_URL" >> .env
            echo "NEXT_PUBLIC_FILE_UPLOAD_API_URL=$FILE_UPLOAD_API_URL" >> .env
            echo "NEXT_PUBLIC_WAITLIST_API_URL=$WAITLIST_API_URL" >> .env
            echo "NEXT_PUBLIC_ML_PIPELINE_API_URL=$ML_PIPELINE_API_URL" >> .env
            echo "NEXT_PUBLIC_BETA_ACCESS_API_URL=$BETA_ACCESS_API_URL" >> .env
            echo "NEXT_PUBLIC_MODEL_DELIVERY_ADMIN_API_URL=$MODEL_DELIVERY_ADMIN_API_URL" >> .env
            echo "NEXT_PUBLIC_EXPLORE_API_URL=$EXPLORE_API_URL" >> .env
            echo "NEXT_PUBLIC_FEEDBACK_API_URL=$FEEDBACK_API_URL" >> .env
            echo "NEXT_PUBLIC_COGNITO_REGION=${{ secrets.COGNITO_REGION_PROD }}" >> .env
            echo "NEXT_PUBLIC_COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID" >> .env
            echo "NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID=$COGNITO_USER_POOL_CLIENT_ID" >> .env
            echo "NEXT_PUBLIC_SUBSCRIPTION_API_URL=$SUBSCRIPTION_API_URL" >> .env
            echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY_PROD }}" >> .env
            echo "NEXT_PUBLIC_SPACES_VIEWER_BASE_URL=https://spcprt.com/spaces" >> .env
          echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_KEY" >> .env
          echo "NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=$GOOGLE_MAPS_MAP_ID" >> .env
            # Analytics environment variables
            echo "NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" >> .env
            echo "NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}" >> .env
            echo "NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}" >> .env
          else
            echo "NEXT_PUBLIC_PROJECTS_API_URL=$PROJECTS_API_URL" >> .env
            echo "NEXT_PUBLIC_DRONE_PATH_API_URL=$DRONE_PATH_API_URL" >> .env
            echo "NEXT_PUBLIC_FILE_UPLOAD_API_URL=$FILE_UPLOAD_API_URL" >> .env
            echo "NEXT_PUBLIC_WAITLIST_API_URL=$WAITLIST_API_URL" >> .env
            echo "NEXT_PUBLIC_ML_PIPELINE_API_URL=$ML_PIPELINE_API_URL" >> .env
            echo "NEXT_PUBLIC_BETA_ACCESS_API_URL=$BETA_ACCESS_API_URL" >> .env
            echo "NEXT_PUBLIC_MODEL_DELIVERY_ADMIN_API_URL=$MODEL_DELIVERY_ADMIN_API_URL" >> .env
            echo "NEXT_PUBLIC_EXPLORE_API_URL=$EXPLORE_API_URL" >> .env
            echo "NEXT_PUBLIC_FEEDBACK_API_URL=$FEEDBACK_API_URL" >> .env
            echo "NEXT_PUBLIC_COGNITO_REGION=${{ secrets.COGNITO_REGION_PREVIEW }}" >> .env
            echo "NEXT_PUBLIC_COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID" >> .env
            echo "NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID=$COGNITO_USER_POOL_CLIENT_ID" >> .env
            echo "NEXT_PUBLIC_SUBSCRIPTION_API_URL=$SUBSCRIPTION_API_URL" >> .env
            echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY_STAGING }}" >> .env
            echo "NEXT_PUBLIC_SPACES_VIEWER_BASE_URL=https://spcprt.com/spaces" >> .env
          echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_KEY" >> .env
          echo "NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=$GOOGLE_MAPS_MAP_ID" >> .env
            # Analytics environment variables
            echo "NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" >> .env
            echo "NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}" >> .env
            echo "NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}" >> .env
          fi
          echo "Wrote $(wc -l < .env) vars to .env"

      - name: Verify injected env values
        run: |
          if ! [ -s .env ]; then
            echo ".env missing or empty" >&2
            exit 1
          fi
          if grep -E '^[[:space:]]*NEXT_PUBLIC_[A-Z0-9_]+=$' .env; then
            echo "Detected empty NEXT_PUBLIC variables in .env" >&2
            exit 1
          fi

      - name: Build Next for Cloudflare (SSR)
        run: |
          npm run build
          npx @cloudflare/next-on-pages

      - name: Debug .vercel/output contents
        run: |
          echo "Listing .vercel/output" && ls -la .vercel/output || true
          echo "Functions manifest.json:" && (cat .vercel/output/functions/manifest.json || true)
          echo "Static dir:" && ls -la .vercel/output/static || true

      - name: Upload .vercel/output for diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: vercel-output-${{ github.sha }}
          path: .vercel/output
          if-no-files-found: ignore
          retention-days: 3

      - name: Install Wrangler
        run: npm i -g wrangler@4

      - name: Ensure Pages runtime flags (compat date + node compat)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MAPS_KEY_PRIMARY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          MAPS_KEY_LEGACY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MAP_ID_PRIMARY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID }}
          MAP_ID_LEGACY: ${{ secrets.GOOGLE_MAPS_MAP_ID }}
        run: |
          set -euo pipefail
          google_maps="$MAPS_KEY_PRIMARY"
          if [ -z "$google_maps" ]; then google_maps="$MAPS_KEY_LEGACY"; fi
          google_maps_map_id="$MAP_ID_PRIMARY"
          if [ -z "$google_maps_map_id" ]; then google_maps_map_id="$MAP_ID_LEGACY"; fi

          jq -n \
            --arg google_maps "$google_maps" \
            --arg google_maps_map_id "$google_maps_map_id" \
            '{
              deployment_configs: {
                production: {
                  compatibility_date: "2025-08-09",
                  compatibility_flags: ["nodejs_compat", "nodejs_compat_populate_process_env"],
                  build_image_major_version: 3,
                  environment_variables: {
                    NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: { value: $google_maps },
                    NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID: { value: $google_maps_map_id }
                  }
                },
                preview: {
                  compatibility_date: "2025-08-09",
                  compatibility_flags: ["nodejs_compat", "nodejs_compat_populate_process_env"],
                  build_image_major_version: 3,
                  environment_variables: {
                    NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: { value: $google_maps },
                    NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID: { value: $google_maps_map_id }
                  }
                }
              }
            }' > payload.json
          curl -fsS -X PATCH \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CF_PAGES_PROJECT}" \
            --data @payload.json | cat

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          # Deploy the static subdir so _worker.js sits at the upload root
          npx wrangler pages deploy .vercel/output/static \
            --project-name "$CF_PAGES_PROJECT" \
            --branch "$BRANCH"

      - name: Resolve latest deployment URLs (preview alias + hash URL)
        id: resolve_urls
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"
          # Get most recent deployment for the selected project (includes preview)
          JSON=$(curl -fsSL -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CF_PAGES_PROJECT}/deployments?per_page=1")
          HASH_URL=$(echo "$JSON" | jq -r '.result[0].url')
          DEPLOY_ID=$(echo "$JSON" | jq -r '.result[0].id')
          # Fetch aliases for that deployment (branch alias if any)
          DETAIL=$(curl -fsSL -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CF_PAGES_PROJECT}/deployments/${DEPLOY_ID}")
          ALIAS=$(echo "$DETAIL" | jq -r '.result.aliases[0] // empty')
          echo "hash_url=$HASH_URL" >> $GITHUB_OUTPUT
          echo "alias_url=$ALIAS" >> $GITHUB_OUTPUT
          echo "Resolved: HASH=$HASH_URL ALIAS=${ALIAS:-<none>}"

      - name: Verify preview alias and hash URL with retries
        env:
          HASH_URL: ${{ steps.resolve_urls.outputs.hash_url }}
          ALIAS_URL: ${{ steps.resolve_urls.outputs.alias_url }}
        run: |
          set -e
          urls=""
          if [ -n "$ALIAS_URL" ]; then urls="$urls $ALIAS_URL"; fi
          if [ -n "$HASH_URL" ]; then urls="$urls $HASH_URL"; fi
          echo "Checking URLs: $urls"
          for URL in $urls; do
            echo "Probing $URL ..."
            for i in $(seq 1 12); do
              echo "Attempt $i"
              if curl -fsS "$URL/health.txt" >/dev/null; then echo "OK $URL/health.txt"; break; fi
              sleep 5
              if [ $i -eq 12 ]; then
                if [ -n "$HASH_URL" ] && [ "$URL" = "$HASH_URL" ]; then
                  echo "Timeout waiting for hash URL $URL; continuing"
                  break
                fi
                echo "Timeout waiting for $URL"
                exit 1
              fi
            done
          done

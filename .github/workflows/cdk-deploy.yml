name: CDK Deploy

on:
  push:
    branches: [ main, development, 'agent-*', 'codex/agent-*', ml-development, email-notifications ]
  pull_request:
    branches: [ main ]

concurrency:
  group: cdk-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    outputs:
      deployment_class: ${{ steps.resolve_context.outputs.deployment_class }}
      branch_id: ${{ steps.resolve_context.outputs.branch_id }}
      spaceport_stack_name: ${{ steps.resolve_context.outputs.spaceport_stack_name }}
      ml_stack_name: ${{ steps.resolve_context.outputs.ml_stack_name }}
      auth_stack_name: ${{ steps.resolve_context.outputs.auth_stack_name }}
      drone_path_api_url: ${{ steps.publish_outputs.outputs.drone_path_api_url }}
      file_upload_api_url: ${{ steps.publish_outputs.outputs.file_upload_api_url }}
      ml_pipeline_api_url: ${{ steps.publish_outputs.outputs.ml_pipeline_api_url }}
    permissions:
      id-token: write   # for GitHub OIDC
      contents: read
    defaults:
      run:
        working-directory: infrastructure/spaceport_cdk

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
        cache-dependency-path: infrastructure/spaceport_cdk/requirements.txt

    - name: Cache Node modules
      uses: actions/cache@v3
      with:
        path: web/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('web/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Cache npm global packages
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-global-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-global-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install specific versions to avoid dependency resolution issues
        pip install aws-cdk-lib==2.89.0 constructs==10.3.0 boto3==1.28.0 --no-deps
        pip install pytest jsii cattrs typeguard typing-extensions publication --no-deps
        # Now install all dependencies
        pip install -e .
        # Pin CDK CLI to match aws-cdk-lib to avoid qualifier context mismatches
        npm install -g aws-cdk@2.89.0
        # Build Next.js site for Cloudflare (placeholder; wired in follow-up steps)
        cd ../../web && (npm ci || npm install) && (npm run build || true)
        cd -

    - name: Configure AWS credentials (production via OIDC)
      if: github.ref_name == 'main'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: us-west-2

    - name: Configure AWS credentials (staging via access keys)
      if: github.ref_name != 'main'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Resolve deployment context
      id: resolve_context
      run: |
        set -euo pipefail
        python3 ../../scripts/resolve_preview_context.py --branch "${GITHUB_REF_NAME}" --format shell > /tmp/deploy-context.env
        cat /tmp/deploy-context.env
        while IFS='=' read -r key value; do
          echo "${key}=${value}" >> "$GITHUB_ENV"
        done < /tmp/deploy-context.env

        echo "deployment_class=${DEPLOYMENT_CLASS:-$(grep '^DEPLOYMENT_CLASS=' /tmp/deploy-context.env | cut -d= -f2-)}" >> "$GITHUB_OUTPUT"
        echo "branch_id=${BRANCH_ID:-$(grep '^BRANCH_ID=' /tmp/deploy-context.env | cut -d= -f2-)}" >> "$GITHUB_OUTPUT"
        echo "spaceport_stack_name=${SPACEPORT_STACK_NAME:-$(grep '^SPACEPORT_STACK_NAME=' /tmp/deploy-context.env | cut -d= -f2-)}" >> "$GITHUB_OUTPUT"
        echo "ml_stack_name=${ML_STACK_NAME:-$(grep '^ML_STACK_NAME=' /tmp/deploy-context.env | cut -d= -f2-)}" >> "$GITHUB_OUTPUT"
        echo "auth_stack_name=${AUTH_STACK_NAME:-$(grep '^AUTH_STACK_NAME=' /tmp/deploy-context.env | cut -d= -f2-)}" >> "$GITHUB_OUTPUT"

    - name: CDK Bootstrap (if needed)
      if: github.event_name == 'push'
      run: |
        set -e
        ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
        
        # Check if CDK is bootstrapped with default qualifier
        if ! aws ssm get-parameter --name "/cdk-bootstrap/hnb659fds/version" --region us-west-2 2>/dev/null; then
          echo "CDK not bootstrapped with default qualifier. Bootstrapping for account $ACCOUNT..."
          
          # Clean up any existing non-standard bootstrap first
          echo "Checking for existing CDK bootstrap stack..."
          if aws cloudformation describe-stacks --stack-name CDKToolkit --region us-west-2 2>/dev/null; then
            echo "Found existing CDKToolkit stack. Deleting to ensure clean bootstrap with default qualifier..."
            aws cloudformation delete-stack --stack-name CDKToolkit --region us-west-2
            echo "Waiting for stack deletion to complete..."
            aws cloudformation wait stack-delete-complete --stack-name CDKToolkit --region us-west-2
            echo "Existing CDK bootstrap stack deleted successfully"
          fi
          
          # Bootstrap with default qualifier for consistency between dev and prod
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "Production bootstrap with OIDC role trust and default qualifier"
            cdk bootstrap aws://$ACCOUNT/us-west-2 \
              --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess \
              --trust arn:aws:iam::$ACCOUNT:role/GithubActionsProdRole
          else
            echo "Development bootstrap with default qualifier"
            cdk bootstrap aws://$ACCOUNT/us-west-2
          fi
        else
          echo "CDK already bootstrapped with default qualifier for account $ACCOUNT"
        fi

    - name: Verify Bootstrap
      if: github.event_name == 'push'
      run: |
        set -e
        ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
        echo "Verifying CDK bootstrap for account $ACCOUNT"

        # Simple verification - check for default qualifier SSM parameter
        echo "Checking for default qualifier bootstrap parameter..."
        if aws ssm get-parameter --name "/cdk-bootstrap/hnb659fds/version" --region us-west-2 >/dev/null 2>&1; then
          echo "✅ CDK bootstrap verified successfully with default qualifier"
        else
          echo "❌ CDK bootstrap verification failed - default qualifier not found"
          echo "This should not happen after the bootstrap step above"
          exit 1
        fi

    # Removed dangerous cleanup script - production stacks should not be deleted automatically

    - name: Deploy CDK Stacks
      if: github.event_name == 'push'
      env:
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        # Stripe secrets for staging environment (CDK expects _TEST suffix for staging)
        STRIPE_SECRET_KEY_TEST: ${{ secrets.STRIPE_SECRET_KEY_STAGING }}
        STRIPE_WEBHOOK_SECRET_STAGING: ${{ secrets.STRIPE_WEBHOOK_SECRET_STAGING }}
        STRIPE_PRICE_SINGLE_STAGING: ${{ secrets.STRIPE_PRICE_SINGLE_STAGING }}
        STRIPE_PRICE_STARTER_STAGING: ${{ secrets.STRIPE_PRICE_STARTER_STAGING }}
        STRIPE_PRICE_GROWTH_STAGING: ${{ secrets.STRIPE_PRICE_GROWTH_STAGING }}
        STRIPE_MODEL_TRAINING_PRICE_STAGING: ${{ secrets.STRIPE_MODEL_TRAINING_PRICE_STAGING }}
        STRIPE_MODEL_HOSTING_PRICE_STAGING: ${{ secrets.STRIPE_MODEL_HOSTING_PRICE_STAGING }}
        # Stripe secrets for production environment
        STRIPE_SECRET_KEY_PROD: ${{ secrets.STRIPE_SECRET_KEY_PROD }}
        STRIPE_WEBHOOK_SECRET_PROD: ${{ secrets.STRIPE_WEBHOOK_SECRET_PROD }}
        STRIPE_PRICE_SINGLE_PROD: ${{ secrets.STRIPE_PRICE_SINGLE_PROD }}
        STRIPE_PRICE_STARTER_PROD: ${{ secrets.STRIPE_PRICE_STARTER_PROD }}
        STRIPE_PRICE_GROWTH_PROD: ${{ secrets.STRIPE_PRICE_GROWTH_PROD }}
        STRIPE_MODEL_TRAINING_PRICE_PROD: ${{ secrets.STRIPE_MODEL_TRAINING_PRICE_PROD }}
        STRIPE_MODEL_HOSTING_PRICE_PROD: ${{ secrets.STRIPE_MODEL_HOSTING_PRICE_PROD }}
        # R2 S3 access credentials
        R2_ENDPOINT_STAGING: ${{ secrets.R2_ENDPOINT_STAGING }}
        R2_ACCESS_KEY_ID_STAGING: ${{ secrets.R2_ACCESS_KEY_ID_STAGING }}
        R2_SECRET_ACCESS_KEY_STAGING: ${{ secrets.R2_SECRET_ACCESS_KEY_STAGING }}
        R2_BUCKET_NAME_STAGING: ${{ secrets.R2_BUCKET_NAME_STAGING }}
        R2_REGION_STAGING: ${{ secrets.R2_REGION_STAGING }}
        R2_ENDPOINT_PROD: ${{ secrets.R2_ENDPOINT_PROD }}
        R2_ACCESS_KEY_ID_PROD: ${{ secrets.R2_ACCESS_KEY_ID_PROD }}
        R2_SECRET_ACCESS_KEY_PROD: ${{ secrets.R2_SECRET_ACCESS_KEY_PROD }}
        R2_BUCKET_NAME_PROD: ${{ secrets.R2_BUCKET_NAME_PROD }}
        R2_REGION_PROD: ${{ secrets.R2_REGION_PROD }}
        # Referral system configuration - using CDK defaults (Option A)
        # REFERRAL_KICKBACK_PERCENTAGE: 10 (default)
        # EMPLOYEE_KICKBACK_PERCENTAGE: 30 (default) 
        # COMPANY_KICKBACK_PERCENTAGE: 70 (default)
        # REFERRAL_DURATION_MONTHS: 6 (default)
        # EMPLOYEE_USER_ID: "" (optional)
        # FRONTEND_URL: "https://spcprt.com" (default)
      run: |
        set -euo pipefail
        ACCOUNT=$(aws sts get-caller-identity --query Account --output text)

        STACKS=("$SPACEPORT_STACK_NAME" "$ML_STACK_NAME")
        if [ "${DEPLOY_AUTH_STACK}" = "true" ]; then
          STACKS+=("$AUTH_STACK_NAME")
        fi

        echo "Deploying ${DEPLOYMENT_CLASS} stacks: ${STACKS[*]}"

        cdk deploy "${STACKS[@]}" \
          --require-approval never \
          --no-fail-on-empty-changeset \
          --context branch_name="${GITHUB_REF_NAME}" \
          --context environment="${CDK_ENVIRONMENT_NAME}" \
          --context account=$ACCOUNT \
          --context region=us-west-2 \
          --parameters "${SPACEPORT_STACK_NAME}:GoogleMapsApiKey=${{ secrets.GOOGLE_MAPS_API_KEY }}"

    - name: Publish deployment outputs
      if: github.event_name == 'push'
      id: publish_outputs
      run: |
        set -euo pipefail

        get_output() {
          local stack_name="$1"
          local output_key="$2"
          local value
          value=$(aws cloudformation describe-stacks \
            --stack-name "$stack_name" \
            --query "Stacks[0].Outputs[?OutputKey=='${output_key}'].OutputValue" \
            --output text)
          if [ -z "$value" ] || [ "$value" = "None" ]; then
            echo "Missing required CloudFormation output ${output_key} on stack ${stack_name}" >&2
            exit 1
          fi
          printf '%s' "$value"
        }

        DRONE_PATH_API_URL="$(get_output "$SPACEPORT_STACK_NAME" "DronePathApiUrl")"
        FILE_UPLOAD_API_URL="$(get_output "$SPACEPORT_STACK_NAME" "FileUploadApiUrl")"
        ML_PIPELINE_API_URL="$(get_output "$ML_STACK_NAME" "MLPipelineApiUrl")"

        echo "Deployment class: $DEPLOYMENT_CLASS"
        echo "Branch ID: ${BRANCH_ID:-<shared>}"
        echo "Spaceport stack: $SPACEPORT_STACK_NAME"
        echo "ML stack: $ML_STACK_NAME"
        echo "Shared auth stack: $AUTH_STACK_NAME"
        echo "Drone Path API: $DRONE_PATH_API_URL"
        echo "File Upload API: $FILE_UPLOAD_API_URL"
        echo "ML Pipeline API: $ML_PIPELINE_API_URL"

        echo "drone_path_api_url=$DRONE_PATH_API_URL" >> "$GITHUB_OUTPUT"
        echo "file_upload_api_url=$FILE_UPLOAD_API_URL" >> "$GITHUB_OUTPUT"
        echo "ml_pipeline_api_url=$ML_PIPELINE_API_URL" >> "$GITHUB_OUTPUT"

    - name: CDK Diff
      if: github.event_name == 'pull_request'
      run: |
        npx cdk diff \
          --context branch_name="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" \
          --context environment=staging
